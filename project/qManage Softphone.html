<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>qManage Softphone</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .qm-bg {
    position: fixed; inset: 0;
    background: #fff;
    overflow: hidden;
  }
  .qm-header {
    height: 64px;
    background: #fff;
    border-bottom: 1px solid #CED0D4;
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    position: relative;
    z-index: 1;
  }
  .qm-logo {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700; font-size: 22px;
    color: #363B4D;
    text-decoration: none;
  }
  .qm-search {
    flex: 1; max-width: 500px; margin: 0 auto;
    height: 40px; border-radius: 4px;
    border: 1px solid #CED0D4;
    background: #F4F6FB;
    display: flex; align-items: center; padding: 0 12px; gap: 8px;
    color: #8D99AE; font-size: 14px; font-family: 'Montserrat', sans-serif;
  }
  .qm-header-right {
    display: flex; align-items: center; gap: 16px; margin-left: auto;
  }
  .qm-icon-btn {
    width: 36px; height: 36px; border-radius: 4px;
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #5F6475; transition: background 0.15s;
  }
  .qm-icon-btn:hover { background: #F4F6FB; }
  .qm-phone-btn {
    width: 36px; height: 36px; border-radius: 4px;
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #5F6475; transition: all 0.15s; position: relative;
  }
  .qm-phone-btn:hover { background: #F4F6FB; }
  .qm-add-ticket {
    height: 36px; padding: 0 16px; border-radius: 4px;
    background: #007FAD; border: none; cursor: pointer;
    color: #fff; font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .qm-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: #A4495D; display: flex; align-items: center;
    justify-content: center; color: #fff; font-size: 12px; font-weight: 700;
  }
  .qm-content {
    padding: 32px;
    background: #F4F6FB;
    min-height: calc(100vh - 64px);
  }

  /* ── SOFTPHONE WIDGET (full) ── */
  .sp-widget {
    width: 450px;
    height: 450px;
    border-radius: 10px;
    background: #363B4D;
    box-shadow: 0px 8px 32px 0px rgba(0,0,0,0.28), 0px 0px 2px 0px rgba(0,0,0,0.16);
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    position: fixed;
    z-index: 1000;
    user-select: none;
    display: flex;
    flex-direction: column;
  }
  .sp-widget-content {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .sp-widget-scroll {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }

  /* ── MINIMIZED PILL ── */
  .sp-mini {
    position: fixed;
    z-index: 1000;
    background: #363B4D;
    border-radius: 12px;
    box-shadow: 0px 8px 24px rgba(0,0,0,0.32);
    padding: 8px 12px 8px 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Montserrat', sans-serif;
    user-select: none;
    min-width: 360px;
  }
  .sp-mini-handle {
    width: 22px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: #5F6475;
    cursor: grab;
    flex-shrink: 0;
  }
  .sp-mini-handle:active { cursor: grabbing; }
  .sp-mini-name {
    color: #fff; font-size: 15px; font-weight: 700;
    white-space: nowrap;
  }
  .sp-mini-timer {
    color: #fff; font-size: 14px; font-weight: 500;
    font-variant-numeric: tabular-nums;
    margin-left: auto;
    white-space: nowrap;
  }
  .sp-mini-end {
    height: 36px; padding: 0 14px; border-radius: 6px;
    border: none; cursor: pointer;
    background: #ED4B52; color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 700;
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  .sp-mini-end:hover { background: #d43f46; }
  .sp-mini-expand {
    width: 32px; height: 32px;
    background: none; border: none; cursor: pointer;
    color: #8D99AE;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .sp-mini-expand:hover { color: #fff; background: rgba(255,255,255,0.06); }

  /* ── DRAG HANDLE (in widget header) ── */
  .sp-drag-handle {
    cursor: grab; color: #5F6475;
    display: flex; align-items: center;
    padding: 4px 6px;
    margin-left: -4px;
  }
  .sp-drag-handle:active { cursor: grabbing; }

  /* ── HEADER BAR ── */
  .sp-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px 0 6px;
    height: 44px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .sp-header-title {
    color: #fff; font-size: 14px; font-weight: 600;
  }
  .sp-header-actions { display: flex; gap: 2px; align-items: center; }
  .sp-hbtn {
    width: 28px; height: 28px; border-radius: 4px;
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #8D99AE; transition: all 0.15s;
  }
  .sp-hbtn:hover { background: rgba(255,255,255,0.08); color: #fff; }

  /* ── BODY ── */
  .sp-body {
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 12px;
  }

  /* ── AVATAR ── */
  .sp-avatar {
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; flex-shrink: 0;
    color: #fff;
  }

  /* ── CONTACT BLOCK ── */
  .sp-contact-name { color: #fff; font-size: 16px; font-weight: 700; text-align: center; }
  .sp-contact-number { color: #fff; font-size: 14px; font-weight: 500; text-align: center; }
  .sp-contact-link { color: #87CFE7; font-size: 12px; font-weight: 500; cursor: pointer; }
  .sp-contact-link:hover { text-decoration: underline; }
  .sp-status-text { color: #8D99AE; font-size: 12px; text-align: center; }
  .sp-timer-text { color: #fff; font-size: 22px; font-weight: 700; text-align: center; letter-spacing: 1px; font-variant-numeric: tabular-nums; }

  /* ── ACTIONS ── */
  .sp-actions {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 6px 0;
    justify-items: center;
    padding: 4px 0;
  }
  .sp-action-btn {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; width: 64px; padding: 4px 0;
    background: none; border: none; cursor: pointer;
  }
  .sp-action-icon {
    width: 42px; height: 42px; border-radius: 50%;
    background: #5F6475;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    color: #fff;
  }
  .sp-action-icon:hover { background: #4a5066; }
  .sp-action-icon.active { background: #007FAD; }
  .sp-action-icon.red { background: #ED4B52; }
  .sp-action-icon.red:hover { background: #d43f46; }
  .sp-action-label {
    color: #CED0D4; font-size: 11px; font-weight: 500;
    text-align: center; line-height: 1.2;
  }

  /* ── DIAL PAD ── */
  .sp-dialpad-input-wrap { position: relative; display: flex; align-items: center; }
  .sp-dialpad-input {
    width: 100%; height: 40px; border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff; font-size: 15px; font-weight: 700;
    font-family: 'Montserrat', sans-serif;
    text-align: center; padding: 0 36px;
    outline: none; letter-spacing: 1px;
  }
  .sp-dialpad-input::placeholder { color: #5F6475; font-weight: 400; }
  .sp-dialpad-suggestion {
    font-size: 11px; color: #8D99AE; font-weight: 500;
    text-align: center; margin-top: -4px;
  }
  .sp-backspace {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: #8D99AE; padding: 4px;
  }
  .sp-backspace:hover { color: #fff; }
  .sp-keypad {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; padding: 0 12px;
  }
  .sp-key {
    height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Montserrat', sans-serif;
    font-size: 16px; font-weight: 700;
    color: #fff;
  }
  .sp-key:hover { background: rgba(255,255,255,0.14); }
  .sp-key:active { background: rgba(255,255,255,0.22); }
  .sp-key-sub { font-size: 8px; font-weight: 500; color: #8D99AE; letter-spacing: 1px; }
  .sp-call-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: #94CC86; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto; color: #253322;
  }
  .sp-call-btn:hover { background: #7fb872; }

  /* ── BOTTOM NAV ── */
  .sp-nav {
    display: flex; align-items: center; justify-content: space-around;
    padding: 6px 8px;
    border-top: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
    background: rgba(0,0,0,0.12);
  }
  .sp-nav-btn {
    flex: 1; height: 44px; border-radius: 6px;
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px;
    color: #8D99AE; transition: all 0.15s;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px; font-weight: 600;
    position: relative;
  }
  .sp-nav-btn:hover { color: #fff; }
  .sp-nav-btn.active { color: #87CFE7; }
  .sp-nav-btn.call-tab.active {
    color: #94CC86;
  }
  .sp-nav-btn.call-tab {
    color: #94CC86;
  }
  .sp-nav-dot {
    position: absolute; top: 6px; right: 14px;
    width: 7px; height: 7px; border-radius: 50%;
    background: #94CC86;
    box-shadow: 0 0 0 0 rgba(148,204,134,0.7);
    animation: pulse-dot 1.6s ease-out infinite;
  }
  @keyframes pulse-dot {
    0% { box-shadow: 0 0 0 0 rgba(148,204,134,0.5); }
    100% { box-shadow: 0 0 0 6px rgba(148,204,134,0); }
  }

  /* ── HISTORY ── */
  .sp-history-list {
    display: flex; flex-direction: column; gap: 2px;
  }
  .sp-history-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 4px; border-radius: 4px;
    cursor: pointer;
  }
  .sp-history-item:hover { background: rgba(255,255,255,0.06); }
  .sp-history-info { flex: 1; min-width: 0; }
  .sp-history-name { color: #fff; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sp-history-meta { color: #8D99AE; font-size: 11px; font-weight: 500; }
  .sp-history-call-btn {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(148,204,134,0.15);
    border: none; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #94CC86;
  }
  .sp-history-call-btn:hover { background: #94CC86; color: #253322; }

  /* ── VOICEMAIL ── */
  .sp-voicemail-item {
    padding: 10px 4px; border-radius: 4px;
    cursor: pointer;
    display: flex; flex-direction: column; gap: 6px;
  }
  .sp-voicemail-item:hover { background: rgba(255,255,255,0.06); }
  .sp-voicemail-row { display: flex; align-items: center; gap: 8px; }
  .sp-voicemail-play {
    width: 28px; height: 28px; border-radius: 50%;
    background: #007FAD; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; flex-shrink: 0;
  }
  .sp-voicemail-bar {
    flex: 1; height: 3px; border-radius: 2px;
    background: rgba(255,255,255,0.15); overflow: hidden;
  }
  .sp-voicemail-progress { height: 100%; background: #007FAD; }

  /* ── CONTACTS ── */
  .sp-contact-search {
    width: 100%; height: 36px; border-radius: 4px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff; font-size: 13px;
    font-family: 'Montserrat', sans-serif;
    padding: 0 12px; outline: none;
  }
  .sp-contact-search::placeholder { color: #5F6475; }
  .sp-contacts-list {
    display: flex; flex-direction: column; gap: 2px;
  }
  .sp-contact-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 4px; border-radius: 4px;
    cursor: pointer;
  }
  .sp-contact-item:hover { background: rgba(255,255,255,0.06); }
  .sp-contact-item-info { flex: 1; min-width: 0; }
  .sp-contact-item-name { color: #fff; font-size: 13px; font-weight: 600; }
  .sp-contact-item-num { color: #8D99AE; font-size: 11px; font-weight: 500; }

  /* ── BUTTONS ── */
  .sp-btn-secondary {
    flex: 1; height: 36px; border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: #fff; cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px; font-weight: 600;
  }
  .sp-btn-secondary:hover { background: rgba(255,255,255,0.12); }
  .sp-btn-primary {
    flex: 1; height: 36px; border-radius: 4px;
    border: none; background: #007FAD;
    color: #fff; cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .sp-btn-primary:hover { background: #005f82; }
  .sp-btn-danger {
    flex: 1; height: 40px; border-radius: 6px;
    border: none; background: #ED4B52;
    color: #fff; cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .sp-btn-danger:hover { background: #d43f46; }
  .sp-btn-accept {
    flex: 1; height: 40px; border-radius: 6px;
    border: none; background: #94CC86;
    color: #253322; cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .sp-btn-accept:hover { background: #7fb872; }

  /* ── CALL INFO BANNER (when on a tab while in call) ── */
  .sp-callinfo-banner {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: rgba(148,204,134,0.1);
    border-bottom: 1px solid rgba(148,204,134,0.2);
    cursor: pointer;
  }
  .sp-callinfo-banner:hover { background: rgba(148,204,134,0.16); }
  .sp-callinfo-pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: #94CC86;
    box-shadow: 0 0 0 0 rgba(148,204,134,0.7);
    animation: pulse-dot 1.6s ease-out infinite;
    flex-shrink: 0;
  }
  .sp-callinfo-name { color: #fff; font-size: 12px; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sp-callinfo-timer { color: #94CC86; font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ── DIVIDER ── */
  .sp-divider { height: 1px; background: rgba(255,255,255,0.08); }

  /* ── BADGE ── */
  .sp-badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 3px;
    font-size: 11px; font-weight: 600;
    background: rgba(135,207,231,0.15);
    color: #87CFE7; border: 1px solid rgba(135,207,231,0.3);
  }

  /* ── TOAST NOTIFICATION ── */
  .sp-toast-notif {
    position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
    background: #363B4D;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; padding: 12px 20px;
    color: #fff; font-size: 13px; font-weight: 500;
    z-index: 3000; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    animation: toastIn 0.3s ease;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── INCOMING PULSE ── */
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  .sp-avatar-pulse { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .sp-avatar-pulse::before, .sp-avatar-pulse::after {
    content: ''; position: absolute;
    width: 100%; height: 100%; border-radius: 50%;
    background: rgba(0,127,173,0.35);
    animation: pulse-ring 1.4s ease-out infinite;
  }
  .sp-avatar-pulse::after { animation-delay: 0.6s; }

  /* ── MAXIMIZED OVERLAY ── */
  .sp-max-backdrop {
    position: fixed; inset: 0;
    background: rgba(20,22,32,0.55);
    backdrop-filter: blur(4px);
    z-index: 1500;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  .sp-max-window {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 720px; max-width: 90vw;
    height: 540px; max-height: 90vh;
    background: #363B4D;
    border-radius: 14px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    z-index: 1600;
    overflow: hidden;
    display: flex;
    font-family: 'Montserrat', sans-serif;
    animation: maxIn 0.22s ease;
  }
  @keyframes maxIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.96) }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1) }
  }
  .sp-max-left {
    flex: 1.2;
    background: linear-gradient(180deg, #2A2F3E 0%, #363B4D 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px;
    gap: 16px;
    position: relative;
  }
  .sp-max-right {
    flex: 1;
    background: #2A2F3E;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sp-max-close {
    position: absolute; top: 14px; right: 14px;
    width: 32px; height: 32px; border-radius: 6px;
    background: rgba(255,255,255,0.06); border: none; cursor: pointer;
    color: #CED0D4;
    display: flex; align-items: center; justify-content: center;
  }
  .sp-max-close:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .sp-max-avatar {
    width: 96px; height: 96px; font-size: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700;
  }
  .sp-max-name { color: #fff; font-size: 22px; font-weight: 700; }
  .sp-max-number { color: #CED0D4; font-size: 14px; font-weight: 500; }
  .sp-max-timer { color: #94CC86; font-size: 32px; font-weight: 700; letter-spacing: 1px; font-variant-numeric: tabular-nums; }
  .sp-max-status { color: #8D99AE; font-size: 13px; }
  .sp-max-actions {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; width: 100%;
    margin-top: 8px;
  }
  .sp-max-action {
    display: flex; flex-direction: column; align-items: center;
    gap: 6px; background: none; border: none; cursor: pointer;
    padding: 8px 0;
  }
  .sp-max-action-icon {
    width: 52px; height: 52px; border-radius: 50%;

// ── Custom hook: drag a fixed-positioned element by a handle ──
function useDrag(initial = { x: window.innerWidth - 360, y: 80 }) {
  const [pos, setPos] = useState(initial);
  const dragRef = useRef(null);
  const startHandler = useCallback((e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startY = e.clientY;
    const startPosX = pos.x;
    const startPosY = pos.y;
    const onMove = (ev) => {
      const nx = Math.max(8, Math.min(window.innerWidth - 200, startPosX + ev.clientX - startX));
      const ny = Math.max(8, Math.min(window.innerHeight - 60, startPosY + ev.clientY - startY));
      setPos({ x: nx, y: ny });
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }, [pos]);
  return [pos, setPos, startHandler];
}

                              <Avatar name={c.name} size={32}/>
                              <div style={{position:'absolute',bottom:0,right:0,width:9,height:9,borderRadius:'50%',background:'#94CC86',border:'1.5px solid #2A2F3E'}}/>
                            </div>
                            <div className="sp-contact-item-info">
                              <div className="sp-contact-item-name">{c.name}</div>
                              <div className="sp-contact-item-num">{c.number}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </>
                  )}
                </div>
              </>
            ) : (
              <>
                <div className="sp-max-tabs">
                  {['details','history','notes'].map(t => (
                    <button key={t} className={`sp-max-tab ${maxTab===t?'active':''}`} onClick={()=>setMaxTab(t)}>
                      {t.charAt(0).toUpperCase()+t.slice(1)}
                    </button>
                  ))}
                </div>
                <div className="sp-max-detail-body">
                  {maxTab==='details' && (
                    <>
                      <div className="sp-max-detail-row">
                        <span className="sp-max-detail-label">Phone</span>
                        <span className="sp-max-detail-link">{activeContact.number}</span>
                      </div>
                      <div className="sp-max-detail-row">
                        <span className="sp-max-detail-label">Email</span>
                        <span className="sp-max-detail-link" style={{wordBreak:'break-all'}}>{activeContact.email || 'c.apegian@csllc.com'}</span>
                      </div>
                      <div className="sp-max-detail-row">
                        <span className="sp-max-detail-label">Company</span>
                        <span className="sp-max-detail-val">{activeContact.company || 'Creative Solutions LLC'}</span>
                      </div>
                      <div className="sp-max-detail-row">
                        <span className="sp-max-detail-label">Role</span>
                        <span className="sp-max-detail-val">
                          <span className="sp-badge">{activeContact.type || 'Superuser'}</span>
                        </span>
                      </div>
                      <div className="sp-max-detail-row">
                        <span className="sp-max-detail-label">Open Tickets</span>
                        <span className="sp-max-detail-val">3 open · 1 high priority</span>
                      </div>
                      <div className="sp-max-detail-row">
                        <span className="sp-max-detail-label">Last Contact</span>
                        <span className="sp-max-detail-val">Yesterday at 4:12 PM (12 min)</span>
                      </div>
                    </>
                  )}
                  {maxTab==='history' && (
                    <div style={{display:'flex',flexDirection:'column',gap:2}}>
                      {HISTORY.filter(h=>h.name===activeContact.name).map(h => (
                        <div key={h.id} className="sp-history-item">
                          <Icon name={h.type==='missed'?'callMissed':h.type==='made'?'callMade':'callReceived'} size={16}
                            color={h.type==='missed'?'#ED4B52':h.type==='made'?'#87CFE7':'#94CC86'}/>
                          <div className="sp-history-info">
                            <div className="sp-history-name">{h.date} · {h.time}</div>
                            <div className="sp-history-meta">{h.type==='missed'?'Missed':h.type==='made'?'Outgoing':'Incoming'} {h.duration && `· ${h.duration}`}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                  {maxTab==='notes' && (
                    <textarea placeholder="Add call notes..."
                      style={{width:'100%',minHeight:200,background:'rgba(255,255,255,0.06)',
                        border:'1px solid rgba(255,255,255,0.1)',borderRadius:6,padding:12,
                        color:'#fff',fontFamily:'Montserrat',fontSize:13,resize:'vertical',outline:'none'}}/>
                  )}
                </div>
                <div className="sp-max-end-bar">
                  <button className="sp-btn-secondary" onClick={()=>setMaximized(false)}>Minimize</button>
                  <button className="sp-btn-danger" onClick={endCall}>
                    <Icon name="callEnd" size={14}/> End Call
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      </>
    );
  };

  // ── Minimized pill ──
  const renderMini = () => (
    <div className="sp-mini" style={{ left: miniPos.x, top: miniPos.y }}>
      <div className="sp-mini-handle" onMouseDown={miniDragStart}>
        <Icon name="drag" size={20}/>
      </div>
      <Avatar name={activeContact.name} size={36} fontSize={13} color={tweaks.accentColor}/>
      <span className="sp-mini-name">{activeContact.name}</span>
      <span className="sp-mini-timer">{onHold ? 'On Hold' : fmt(callTimer)}</span>
      <button className="sp-mini-end" onClick={endCall}>
        <Icon name="callEnd" size={14}/> End
      </button>
      <button className="sp-mini-expand" onClick={()=>{setMinimized(false);setOpen(true);setNavTab('call');}} title="Expand">
        <Icon name="expand" size={16}/>
      </button>
    </div>
  );

  return (
    <>
      {/* Minimized pill (only when in call & minimized) */}
      {minimized && isInCall && renderMini()}

      {/* Full widget */}
      {open && !minimized && (
        <div className="sp-widget" style={{ left: widgetPos.x, top: widgetPos.y }}>
          <div className="sp-header">
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div className="sp-drag-handle" onMouseDown={widgetDragStart}>
                <Icon name="drag" size={18}/>
              </div>
              <span className="sp-header-title">{headerTitles[screen] || 'Softphone'}</span>
            </div>
            <div className="sp-header-actions">
              {isInCall && (
                <button className="sp-hbtn" title="Minimize" onClick={()=>{setMinimized(true);setOpen(false);}}>
                  <Icon name="minimize" size={14}/>
                </button>
              )}
              {false && isInCall && (
                <button className="sp-hbtn" title="Minimize" onClick={()=>{setMinimized(true);setOpen(false);}}>
                  <Icon name="minimize" size={14}/>
                </button>
              )}
              {screen==='idle' && (
                <button className="sp-hbtn" title="Simulate incoming call" onClick={triggerIncoming}>
                  <Icon name="call" size={14}/>
                </button>
              )}
              <button className="sp-hbtn" onClick={()=>setOpen(false)} title="Close">
                <Icon name="close" size={14}/>
              </button>
            </div>
          </div>
          {renderMainContent()}
        </div>
      )}

      {/* Toast */}
      {toast && <div className="sp-toast-notif">{toast}</div>}

      {/* Tweaks */}
      {window.TweaksPanel && (
        <window.TweaksPanel>
          <window.TweakColor label="Accent color" value={tweaks.accentColor} onChange={v=>setTweak('accentColor',v)}/>
          <window.TweakToggle label="Avatar pulse on incoming" value={tweaks.showAvatarPulse} onChange={v=>setTweak('showAvatarPulse',v)}/>
          <window.TweakToggle label="Auto-trigger incoming call" value={tweaks.autoIncoming} onChange={v=>setTweak('autoIncoming',v)}/>
          <window.TweakButton label="Simulate incoming call" onClick={triggerIncoming}/>
          {isInCall && <window.TweakButton label={minimized?"Maximize":"Minimize to pill"} onClick={()=>{setMinimized(m=>!m);setOpen(o=>minimized?true:false);}}/>}
        </window.TweaksPanel>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<SoftphoneApp />);
</script>
</body>
</html>
