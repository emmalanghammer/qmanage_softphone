<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>qManage Softphone</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── qManage App Shell ── */
  .qm-bg { position: fixed; inset: 0; background: #fff; overflow: hidden; }
  .qm-header {
    height: 64px; background: #fff; border-bottom: 1px solid #CED0D4;
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
    position: relative; z-index: 1;
  }
  .qm-logo {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700; font-size: 22px; color: #363B4D;
  }
  .qm-search {
    flex: 1; max-width: 500px; margin: 0 auto;
    height: 40px; border-radius: 4px; border: 1px solid #CED0D4;
    background: #F4F6FB; display: flex; align-items: center;
    padding: 0 12px; gap: 8px; color: #8D99AE; font-size: 14px;
    font-family: 'Montserrat', sans-serif;
  }
  .qm-header-right { display: flex; align-items: center; gap: 16px; margin-left: auto; }
  .qm-icon-btn {
    width: 36px; height: 36px; border-radius: 4px;
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #5F6475; transition: background 0.15s;
  }
  .qm-icon-btn:hover { background: #F4F6FB; }
  .qm-phone-btn {
    width: 36px; height: 36px; border-radius: 4px;
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #5F6475; transition: all 0.15s; position: relative;
  }
  .qm-phone-btn:hover { background: #F4F6FB; }
  .qm-add-ticket {
    height: 36px; padding: 0 16px; border-radius: 4px;
    background: #007FAD; border: none; cursor: pointer;
    color: #fff; font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .qm-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: #A4495D; display: flex; align-items: center;
    justify-content: center; color: #fff; font-size: 12px; font-weight: 700;
  }
  .qm-content { padding: 32px; background: #F4F6FB; min-height: calc(100vh - 64px); }

  /* ── Softphone Widget ── */
  .sp-widget {
    width: 450px; height: 550px; border-radius: 10px;
    background: #363B4D;
    box-shadow: 0px 8px 32px 0px rgba(0,0,0,0.28), 0px 0px 2px 0px rgba(0,0,0,0.16);
    overflow: hidden; font-family: 'Montserrat', sans-serif;
    position: fixed; z-index: 1000; user-select: none;
    display: flex; flex-direction: column;
  }
  .sp-widget-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
  .sp-widget-scroll { flex: 1; overflow-y: auto; min-height: 0; }

  /* ── Minimized Pill ── */
  .sp-mini {
    position: fixed; z-index: 1000; background: #363B4D;
    border-radius: 12px; box-shadow: 0px 8px 24px rgba(0,0,0,0.32);
    padding: 8px 12px 8px 8px;
    display: flex; align-items: center; gap: 12px;
    font-family: 'Montserrat', sans-serif; user-select: none; min-width: 360px;
  }
  .sp-mini-handle {
    width: 22px; height: 32px; display: flex; align-items: center; justify-content: center;
    color: #5F6475; cursor: grab; flex-shrink: 0;
  }
  .sp-mini-handle:active { cursor: grabbing; }
  .sp-mini-name { color: #fff; font-size: 15px; font-weight: 700; white-space: nowrap; }
  .sp-mini-timer {
    color: #fff; font-size: 14px; font-weight: 500;
    font-variant-numeric: tabular-nums; margin-left: auto; white-space: nowrap;
  }
  .sp-mini-end {
    height: 36px; padding: 0 14px; border-radius: 6px; border: none; cursor: pointer;
    background: #ED4B52; color: #fff; font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .sp-mini-end:hover { background: #d43f46; }
  .sp-mini-expand {
    width: 32px; height: 32px; background: none; border: none; cursor: pointer;
    color: #8D99AE; display: flex; align-items: center; justify-content: center;
    border-radius: 4px; flex-shrink: 0;
  }
  .sp-mini-expand:hover { color: #fff; background: rgba(255,255,255,0.06); }

  /* ── Drag Handle ── */
  .sp-drag-handle {
    cursor: grab; color: #5F6475;
    display: flex; align-items: center; padding: 4px 6px; margin-left: -4px;
  }
  .sp-drag-handle:active { cursor: grabbing; }

  /* ── Widget Header ── */
  .sp-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px 0 6px; height: 48px;
    border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
  }
  .sp-header-title { color: #fff; font-size: 14px; font-weight: 600; }
  .sp-header-actions { display: flex; gap: 2px; align-items: center; }
  .sp-hbtn {
    width: 28px; height: 28px; border-radius: 4px;
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #8D99AE; transition: all 0.15s;
  }
  .sp-hbtn:hover { background: rgba(255,255,255,0.08); color: #fff; }

  /* ── Body ── */
  .sp-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

  /* ── Avatar ── */
  .sp-avatar {
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 700; flex-shrink: 0; color: #fff;
  }

  /* ── Contact Block ── */
  .sp-contact-name { color: #fff; font-size: 16px; font-weight: 700; text-align: center; }
  .sp-contact-number { color: #fff; font-size: 14px; font-weight: 500; text-align: center; }
  .sp-contact-link { color: #87CFE7; font-size: 12px; font-weight: 500; cursor: pointer; }
  .sp-contact-link:hover { text-decoration: underline; }
  .sp-timer-text {
    color: #fff; font-size: 22px; font-weight: 700; text-align: center;
    letter-spacing: 1px; font-variant-numeric: tabular-nums;
  }

  /* ── Action Buttons ── */
  .sp-actions {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 6px 0; justify-items: center; padding: 4px 0;
  }
  .sp-action-btn {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; width: 64px; padding: 4px 0; background: none; border: none; cursor: pointer;
  }
  .sp-action-icon {
    width: 42px; height: 42px; border-radius: 50%;
    background: #5F6475; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; color: #fff;
  }
  .sp-action-icon:hover { background: #4a5066; }
  .sp-action-icon.active { background: #007FAD; }
  .sp-action-icon.red { background: #ED4B52; }
  .sp-action-icon.red:hover { background: #d43f46; }
  .sp-action-label { color: #CED0D4; font-size: 11px; font-weight: 500; text-align: center; line-height: 1.2; }

  /* ── Dial Pad ── */
  .sp-dialpad-input-wrap { position: relative; display: flex; align-items: center; }
  .sp-dialpad-input {
    width: 100%; height: 40px; border-radius: 20px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    color: #fff; font-size: 15px; font-weight: 700; font-family: 'Montserrat', sans-serif;
    text-align: center; padding: 0 36px; outline: none; letter-spacing: 1px;
  }
  .sp-dialpad-input::placeholder { color: #5F6475; font-weight: 400; }
  .sp-dialpad-suggestion { font-size: 11px; color: #8D99AE; font-weight: 500; text-align: center; margin-top: -4px; }
  .sp-backspace {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: #8D99AE; padding: 4px;
  }
  .sp-backspace:hover { color: #fff; }
  .sp-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 32px; justify-items: center; }
  .sp-key {
    width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 600; color: #fff;
  }
  .sp-key:hover { background: rgba(255,255,255,0.17); }
  .sp-key:active { background: rgba(255,255,255,0.25); }
  .sp-call-btn {
    width: 56px; height: 56px; border-radius: 50%;
    background: #94CC86; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto; color: #253322;
  }
  .sp-call-btn:hover { background: #7fb872; }

  /* ── Bottom Nav ── */
  .sp-nav {
    display: flex; align-items: center; justify-content: space-around;
    padding: 6px 8px; border-top: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0; background: rgba(0,0,0,0.12);
  }
  .sp-nav-btn {
    flex: 1; height: 44px; border-radius: 6px; background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px; color: #8D99AE; transition: all 0.15s;
    font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 600; position: relative;
  }
  .sp-nav-btn:hover { color: #fff; }
  .sp-nav-btn.active { color: #87CFE7; }
  .sp-nav-btn.call-tab { color: #94CC86; }
  .sp-nav-btn.call-tab.active { color: #94CC86; }
  .sp-nav-dot {
    position: absolute; top: 6px; right: 14px;
    width: 7px; height: 7px; border-radius: 50%; background: #94CC86;
    animation: pulse-dot 1.6s ease-out infinite;
  }
  @keyframes pulse-dot {
    0% { box-shadow: 0 0 0 0 rgba(148,204,134,0.5); }
    100% { box-shadow: 0 0 0 6px rgba(148,204,134,0); }
  }

  /* ── Call Info Banner ── */
  .sp-callinfo-banner {
    display: flex; align-items: center; gap: 10px; padding: 8px 12px;
    background: rgba(148,204,134,0.1); border-bottom: 1px solid rgba(148,204,134,0.2);
    cursor: pointer;
  }
  .sp-callinfo-banner:hover { background: rgba(148,204,134,0.16); }
  .sp-callinfo-pulse {
    width: 8px; height: 8px; border-radius: 50%; background: #94CC86; flex-shrink: 0;
    animation: pulse-dot 1.6s ease-out infinite;
  }
  .sp-callinfo-name { color: #fff; font-size: 12px; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sp-callinfo-timer { color: #94CC86; font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ── History ── */
  .sp-history-list { display: flex; flex-direction: column; gap: 2px; }
  .sp-history-item { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-radius: 4px; cursor: pointer; }
  .sp-history-item:hover { background: rgba(255,255,255,0.06); }
  .sp-history-info { flex: 1; min-width: 0; }
  .sp-history-name { color: #fff; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sp-history-meta { color: #8D99AE; font-size: 11px; font-weight: 500; }
  .sp-history-call-btn {
    width: 28px; height: 28px; border-radius: 50%; background: rgba(148,204,134,0.15);
    border: none; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; color: #94CC86;
  }
  .sp-history-call-btn:hover { background: #94CC86; color: #253322; }

  /* ── Voicemail ── */
  .sp-voicemail-item { padding: 10px 4px; border-radius: 4px; cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
  .sp-voicemail-item:hover { background: rgba(255,255,255,0.06); }
  .sp-voicemail-row { display: flex; align-items: center; gap: 8px; }
  .sp-voicemail-play {
    width: 28px; height: 28px; border-radius: 50%; background: #007FAD; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0;
  }
  .sp-voicemail-bar { flex: 1; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.15); overflow: hidden; }
  .sp-voicemail-progress { height: 100%; background: #007FAD; }

  /* ── Contacts ── */
  .sp-contact-search {
    width: 100%; height: 36px; border-radius: 4px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    color: #fff; font-size: 13px; font-family: 'Montserrat', sans-serif;
    padding: 0 12px; outline: none;
  }
  .sp-contact-search::placeholder { color: #5F6475; }
  .sp-contacts-list { display: flex; flex-direction: column; gap: 2px; }
  .sp-contact-item { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-radius: 4px; cursor: pointer; }
  .sp-contact-item:hover { background: rgba(255,255,255,0.06); }
  .sp-contact-item-info { flex: 1; min-width: 0; }
  .sp-contact-item-name { color: #fff; font-size: 13px; font-weight: 600; }
  .sp-contact-item-num { color: #8D99AE; font-size: 11px; font-weight: 500; }

  /* ── Buttons ── */
  .sp-btn-secondary {
    flex: 1; height: 36px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06); color: #fff; cursor: pointer;
    font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600;
  }
  .sp-btn-secondary:hover { background: rgba(255,255,255,0.12); }
  .sp-btn-primary {
    flex: 1; height: 36px; border-radius: 4px; border: none; background: #007FAD;
    color: #fff; cursor: pointer; font-family: 'Montserrat', sans-serif;
    font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .sp-btn-primary:hover { background: #005f82; }
  .sp-btn-danger {
    width: 100%; height: 40px; border-radius: 6px; border: none; background: #ED4B52;
    color: #fff; cursor: pointer; font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .sp-btn-danger:hover { background: #d43f46; }
  .sp-btn-accept {
    width: 100%; height: 40px; border-radius: 6px; border: none; background: #94CC86;
    color: #253322; cursor: pointer; font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .sp-btn-accept:hover { background: #7fb872; }

  /* ── Divider ── */
  .sp-divider { height: 1px; background: rgba(255,255,255,0.08); }

  /* ── Badge ── */
  .sp-badge {
    display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 3px;
    font-size: 11px; font-weight: 600;
    background: rgba(135,207,231,0.15); color: #87CFE7; border: 1px solid rgba(135,207,231,0.3);
  }

  /* ── Header Call Status Chip ── */
  .qm-call-chip {
    display: none; align-items: center; gap: 6px; padding: 0 12px; height: 32px;
    border-radius: 16px; font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 700; white-space: nowrap; cursor: pointer;
    transition: all 0.2s;
  }
  .qm-call-chip.incoming { display: flex; background: #94CC86; color: #253322; }
  .qm-call-chip.active-call { display: flex; background: #007FAD; color: #fff; }

  /* ── Toast ── */
  .sp-toast-notif {
    position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
    background: #363B4D; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; padding: 12px 20px; color: #fff; font-size: 13px; font-weight: 500;
    z-index: 3000; box-shadow: 0 4px 16px rgba(0,0,0,0.3); animation: toastIn 0.3s ease;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── Incoming Pulse Ring ── */
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  .sp-avatar-pulse { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .sp-avatar-pulse::before, .sp-avatar-pulse::after {
    content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
    background: rgba(0,127,173,0.35); animation: pulse-ring 1.4s ease-out infinite;
  }
  .sp-avatar-pulse::after { animation-delay: 0.6s; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  /* ── New Ticket Modal ── */
  .nt-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000;
    display: flex; align-items: center; justify-content: center;
  }
  .nt-modal {
    background: #fff; border-radius: 6px; width: 560px; max-width: 96vw;
    box-shadow: 0 8px 40px rgba(0,0,0,0.22); font-family: 'Montserrat', sans-serif;
    display: flex; flex-direction: column; max-height: 90vh; overflow: hidden;
  }
  .nt-header {
    display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid #CED0D4;
    gap: 8px;
  }
  .nt-title { flex: 1; font-size: 16px; font-weight: 700; color: #363B4D; }
  .nt-hbtn {
    width: 28px; height: 28px; border-radius: 4px; border: none; cursor: pointer;
    background: none; color: #8D99AE; display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: background 0.15s;
  }
  .nt-hbtn:hover { background: #F4F6FB; color: #363B4D; }
  .nt-body { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
  .nt-section-label { font-size: 13px; font-weight: 700; color: #363B4D; margin-bottom: 10px; }
  .nt-field { display: flex; flex-direction: column; gap: 4px; }
  .nt-label { font-size: 12px; font-weight: 600; color: #5F6475; }
  .nt-label span { color: #ED4B52; }
  .nt-select, .nt-input {
    height: 36px; border-radius: 4px; border: 1px solid #CED0D4;
    padding: 0 10px; font-family: 'Montserrat', sans-serif; font-size: 13px;
    color: #363B4D; background: #fff; outline: none; width: 100%;
  }
  .nt-select:focus, .nt-input:focus { border-color: #007FAD; }
  .nt-input.error { border-color: #ED4B52; }
  .nt-error { font-size: 11px; color: #ED4B52; font-weight: 500; }
  .nt-add-contacts {
    height: 36px; border-radius: 4px; border: 1px solid #007FAD;
    background: #fff; color: #007FAD; font-family: 'Montserrat', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .nt-add-contacts:hover { background: #F4F6FB; }
  .nt-desc-toolbar {
    display: flex; gap: 2px; padding: 6px 8px; border: 1px solid #CED0D4;
    border-bottom: none; border-radius: 4px 4px 0 0; background: #F4F6FB; flex-wrap: wrap;
  }
  .nt-tool {
    width: 26px; height: 24px; border-radius: 3px; border: none; background: none;
    cursor: pointer; color: #5F6475; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .nt-tool:hover { background: #CED0D4; color: #363B4D; }
  .nt-desc-area {
    width: 100%; min-height: 100px; border: 1px solid #CED0D4; border-radius: 0 0 4px 4px;
    padding: 10px; font-family: 'Montserrat', sans-serif; font-size: 13px; color: #363B4D;
    resize: vertical; outline: none;
  }
  .nt-desc-area:focus { border-color: #007FAD; }
  .nt-footer {
    display: flex; align-items: center; padding: 12px 20px; border-top: 1px solid #CED0D4; gap: 8px;
  }
  .nt-priority-dot {
    width: 24px; height: 24px; border-radius: 50%; background: #ED4B52;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .nt-btn-save {
    height: 34px; padding: 0 14px; border-radius: 4px; border: 1px solid #CED0D4;

function useTweaks(defaults) {
  const [values, setValues] = useState(defaults);
  const setTweak = useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ children }) {
  const [open, setOpen] = useState(false);
  const dragRef = useRef(null);
  const offsetRef = useRef({ x: 16, y: 16 });

  const clamp = useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    offsetRef.current = {
      x: Math.min(Math.max(16, window.innerWidth - w - 16), Math.max(16, offsetRef.current.x)),
      y: Math.min(Math.max(16, window.innerHeight - h - 16), Math.max(16, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  useEffect(() => {
    const onMsg = (e) => {
      if (e?.data?.type === '__activate_edit_mode') setOpen(true);
      else if (e?.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clamp();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>Tweaks</b>
          <button className="twk-x" onMouseDown={e=>e.stopPropagation()}
            onClick={() => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakColor({ label, value, onChange }) {

    <div className="twk-row twk-row-h">

      <input type="color" className="twk-swatch" value={value} onChange={e=>onChange(e.target.value)} />
    </div>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
        onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakButton({ label, onClick }) {
  return <button type="button" className="twk-btn" onClick={onClick}>{label}</button>;

// ─────────────────────────────────────────────────────────────
// Drag hook — stable handler via ref, no stale closures
// ─────────────────────────────────────────────────────────────
function useDrag(initial) {
  const [pos, setPos] = useState(initial);
  const posRef = useRef(pos);
  posRef.current = pos;

  const startHandler = useCallback((e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startY = e.clientY;
    const startPosX = posRef.current.x;
    const startPosY = posRef.current.y;
    const onMove = (ev) => {
      const nx = Math.max(8, Math.min(window.innerWidth - 240, startPosX + ev.clientX - startX));
      const ny = Math.max(8, Math.min(window.innerHeight - 60, startPosY + ev.clientY - startY));
      setPos({ x: nx, y: ny });
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }, []);

  return [pos, setPos, startHandler];
}

    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>

          <Icon name="arrowLeft" size={16}/> Back
        </button>
        <input className="sp-contact-search" placeholder="Search users or contacts..."

                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>

  // ── Render: Participants List (All Users in call) ──
  const renderParticipantsList = () => {

    const renderRow = (p, isYou = false, isFixed = false) => (
      <div key={p.id || 'you'} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '6px 0' }}>
        <div style={{ position: 'relative', flexShrink: 0 }}>
          <Avatar name={p.name} size={32}/>
          {!isYou && p.type === 'User' && agentStatusColor(p.status) && (
            <div style={{ position: 'absolute', bottom: 0, right: 0, width: 10, height: 10,
              borderRadius: '50%', background: agentStatusColor(p.status), border: '1.5px solid #363B4D' }}/>

        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ color: '#fff', fontSize: 13, fontWeight: 600 }}>{p.name}{isYou && <span style={{ color: '#8D99AE', fontWeight: 400 }}> (You)</span>}</div>

        <div>

          <div>

            { icon: 'dialpad', label: 'Keypad', action: () => { setParticipantsOpen(false); setShowKeypad(true); } },
            { icon: 'personAdd', label: 'Add', action: () => { setParticipantsOpen(false); setAddOpen(true); } },
            { icon: 'forward', label: 'Transfer', action: () => { setParticipantsOpen(false); setTransferOpen(true); setTransferTab('users'); } },

              </div>
              <span className="sp-action-label">{a.label}</span>
            </button>
          ))}
        </div>
      </div>

            <Icon name="call" size={16} color="#fff"/> Transfer {activeContact.name}

      const c = CONTACTS.find(x => x.name === activeContact.name) || activeContact;
      return renderContactDetail(c, () => setCallDetailOpen(false));

    if (addOpen) return renderAddSearch();
    if (participantsOpen) return renderParticipantsList();
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, alignItems: 'center', position: 'relative' }}>
        {participants.length > 0 && (
          <button onClick={() => setParticipantsOpen(true)}
            style={{ position: 'absolute', top: 0, right: 0, display: 'flex', alignItems: 'center', gap: 4,
              background: 'rgba(0,127,173,0.2)', border: '1px solid rgba(0,127,173,0.4)', borderRadius: 12,
              padding: '3px 8px', cursor: 'pointer', color: '#87CFE7',
              fontFamily: 'Montserrat', fontSize: 10, fontWeight: 700 }}>
            <Icon name="group" size={13}/> +{participants.length} in call
          </button>

        <Avatar name={activeContact.name} size={64} fontSize={20} color={tweaks.accentColor}/>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 3, alignItems: 'center' }}>
          <span className="sp-contact-name">{activeContact.name}</span>
          <span style={{ color: '#8D99AE', fontSize: 12 }}>{activeContact.number}</span>
          {activeContact.company && <span style={{ color: '#8D99AE', fontSize: 12 }}>{activeContact.company}</span>}

            style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#87CFE7',
              fontFamily: 'Montserrat', fontSize: 12, fontWeight: 600, padding: '2px 0', marginTop: 1 }}>

            <button onClick={() => setShowKeypad(false)}

                cursor: 'pointer', color: '#87CFE7', fontFamily: 'Montserrat', fontSize: 13, fontWeight: 600,
                padding: '4px 0', alignSelf: 'flex-start' }}>
              <Icon name="arrowLeft" size={16}/> Back to call
            </button>
            {renderDialpad(true)}
          </div>
        ) : (
          <div className="sp-actions">
            {[
              { icon: muted ? 'micOff' : 'mic', label: muted ? 'Unmute' : 'Mute', action: () => setMuted(m => !m), active: muted },
              { icon: onHold ? 'play' : 'pause', label: onHold ? 'Resume' : 'Hold', action: () => setOnHold(h => !h), active: onHold },
              { icon: 'dialpad', label: 'Keypad', action: () => setShowKeypad(s => !s) },
              { icon: 'personAdd', label: 'Add', action: () => setAddOpen(true), active: participants.length > 0 },
              { icon: 'forward', label: 'Transfer', action: () => { setTransferOpen(true); setTransferTab('users'); } },
              { icon: 'callEnd', label: 'End', action: endCall, red: true },
            ].map((a, i) => (
              <button key={i} className="sp-action-btn" onClick={a.action}>
                <div className={`sp-action-icon ${a.red ? 'red' : ''} ${a.active ? 'active' : ''}`}>
                  <Icon name={a.icon} size={18}/>
                </div>
                <span className="sp-action-label">{a.label}</span>
              </button>
            ))}
          </div>
        )}
      </div>
    );

  // ── Render: Transfer (inline in widget) ──
  const renderTransferInline = () => {
    const isQueue = transferTab === 'queues';
    const pool = isQueue ? QUEUES : AGENTS;
    const filtered = pool.filter(a =>
      a.name.toLowerCase().includes(transferSearch.toLowerCase()) ||
      (!isQueue && a.title.toLowerCase().includes(transferSearch.toLowerCase()))

    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        <button onClick={() => { setTransferOpen(false); setTransferTarget(null); setTransferSearch(''); }}

            cursor: 'pointer', color: '#87CFE7', fontFamily: 'Montserrat', fontSize: 13, fontWeight: 600,
            padding: '2px 0', alignSelf: 'flex-start' }}>
          <Icon name="arrowLeft" size={16}/> Back
        </button>
        {transferTarget ? (
          <>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0' }}>
              {transferTarget.agents != null ? (
                <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'rgba(135,207,231,0.15)',

                  <Icon name="group" size={22} color="#87CFE7"/>
                </div>
              ) : (
                <div style={{ position: 'relative', flexShrink: 0 }}>
                  <Avatar name={transferTarget.name} size={44}/>

                    <div style={{ position: 'absolute', bottom: 0, right: 0, width: 11, height: 11,
                      borderRadius: '50%', background: agentStatusColor(transferTarget.status), border: '2px solid #363B4D' }}/>

                </div>

              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ color: '#fff', fontSize: 14, fontWeight: 700 }}>{transferTarget.name}</div>

                <div style={{ color: '#8D99AE', fontSize: 11 }}>
                  {transferTarget.agents != null

            <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#8D99AE',
              fontFamily: 'Montserrat', fontSize: 12, fontWeight: 600, padding: '4px 0', alignSelf: 'center' }}

          <>
            <div style={{ display: 'flex', gap: 2, padding: 2, background: 'rgba(0,0,0,0.18)', borderRadius: 6 }}>
              {['users', 'queues'].map(t => (
                <button key={t} onClick={() => { setTransferTab(t); setTransferSearch(''); }}
                  style={{ flex: 1, height: 30, borderRadius: 4, border: 'none', cursor: 'pointer',
                    background: transferTab === t ? '#F4F6FB' : 'transparent',
                    color: transferTab === t ? '#363B4D' : '#fff',

                    </div>

                </div>
              ))}
            </div>
          </>
        )}
      </div>
    );

  // ── Render: Bottom Nav ──
  const renderNav = () => {

      { id: 'dialpad',  icon: 'dialpad',   label: 'Keypad' },
      { id: 'contacts', icon: 'contacts',  label: 'Contacts' },

      { id: 'history',  icon: 'history',   label: 'History' },

    if (isInCall) items.unshift({ id: 'call', icon: 'call', label: 'Call', isCall: true });
    return (
      <div className="sp-nav">
        {items.map(n => (
          <button key={n.id} className={`sp-nav-btn ${navTab === n.id ? 'active' : ''} ${n.isCall ? 'call-tab' : ''}`}
            onClick={() => setNavTab(n.id)} title={n.label}>
            <Icon name={n.icon} size={20}/>
            <span>{n.label}</span>
            {n.isCall && navTab !== 'call' && <span className="sp-nav-dot"/>}
          </button>
        ))}
      </div>
    );
  };

  const renderIncoming = () => (
    <div className="sp-body" style={{ gap: 14, alignItems: 'center', padding: '24px 20px' }}>
      <div className={tweaks.showAvatarPulse ? 'sp-avatar-pulse' : ''}>

      </div>

                {navTab === 'dialpad'  && renderDialpad()}
                {navTab === 'contacts' && renderContacts()}
                {navTab === 'users'    && renderUsers()}
                {navTab === 'history'  && renderHistory()}
                {navTab === 'call' && isInCall && renderCallTab()}
              </>
            )}
          </div>
        </div>
        {renderNav()}
      </div>
    );
  };

  // ── Render: Minimized Pill (handles active, outgoing, and incoming) ──
  const renderMiniSmall = () => {
    const isRinging = screen === 'incoming' || screen === 'outgoing';
    return (
      <div className="sp-mini" style={{ left: miniPos.x, top: miniPos.y }}>
        <div className="sp-mini-handle" onMouseDown={miniDragStart}>
          <Icon name="drag" size={20}/>
        </div>
        <Avatar name={activeContact.name} size={36} fontSize={13} color={tweaks.accentColor}/>
        <span className="sp-mini-name">{activeContact.name}</span>
        {isRinging
          ? <span className="sp-mini-timer" style={{ color: '#8D99AE' }}>Ringing...</span>
          : <span className="sp-mini-timer">{onHold ? 'On Hold' : fmt(callTimer)}</span>
        }
        <button className="sp-mini-end" onClick={endCall}>
          <Icon name="callEnd" size={14}/> {isRinging ? 'Cancel' : 'End'}
        </button>
        <button className="sp-mini-expand" onClick={() => { setMinimized(false); setOpen(true); if (isInCall) setNavTab('call'); }} title="Expand">
          <Icon name="expand" size={16}/>
        </button>
      </div>
    );
  };

  return (
    <>
      {minimized && isCalling && renderMiniSmall()}

      {open && !minimized && (
        <div className="sp-widget" style={{ left: widgetPos.x, top: widgetPos.y }}>
          <div className="sp-header">
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <div className="sp-drag-handle" onMouseDown={widgetDragStart}>
                <Icon name="drag" size={18}/>
              </div>
              <span className="sp-header-title">{headerTitle()}</span>
            </div>
            <div className="sp-header-actions">
              {isCalling && (
                <button className="sp-hbtn" title="Minimize to pill" onClick={() => { setMinimized(true); setOpen(false); }}>
                  <Icon name="minimize" size={14}/>
                </button>
              )}
              {screen === 'idle' && (
                <button className="sp-hbtn" title="Simulate incoming call" onClick={triggerIncoming}>
                  <Icon name="call" size={14}/>
                </button>
              )}
              <button className="sp-hbtn" title="Pop out" onClick={() => showToast('Popped out')}>
                <Icon name="popout" size={14}/>
              </button>
              <button className="sp-hbtn" onClick={() => setOpen(false)} title="Close">
                <Icon name="close" size={14}/>
              </button>
            </div>
          </div>
          {renderMainContent()}
        </div>
      )}

      {toast && <div className="sp-toast-notif">{toast}</div>}

      {ticketModalOpen && (
        <div className="nt-overlay" onClick={e => { if (e.target === e.currentTarget) setTicketModalOpen(false); }}>
          <div className="nt-modal">
            <div className="nt-header">
              <span className="nt-title">New Ticket</span>
              <button className="nt-hbtn" title="Help">?</button>
              <button className="nt-hbtn" onClick={() => setTicketModalOpen(false)} title="Close">✕</button>
            </div>
            <div className="nt-body">
              <div>
                <div className="nt-section-label">Details</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <div className="nt-field">
                    <label className="nt-label">Type <span>*</span></label>
                    <select className="nt-select" value={ticketType} onChange={e => setTicketType(e.target.value)}>
                      <option>Default</option>
                      <option>Bug</option>
                      <option>Feature Request</option>
                      <option>Support</option>
                    </select>
                  </div>
                  <div className="nt-field">
                    <label className="nt-label">Title <span>*</span></label>
                    <input className={`nt-input${ticketTitleError ? ' error' : ''}`} placeholder=""
                      value={ticketTitle} onChange={e => { setTicketTitle(e.target.value); setTicketTitleError(false); }}/>
                    {ticketTitleError && <span className="nt-error">Please provide a title</span>}
                  </div>
                </div>
              </div>
              <div>
                <div className="nt-section-label">Contacts</div>
                <button className="nt-add-contacts">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                  Add Contacts
                </button>
              </div>
              <div>
                <div className="nt-section-label">Description</div>
                <div className="nt-desc-toolbar">
                  {['B','I','U','≡','≡','≡','⋮≡','⋮≡'].map((t,i) => <button key={i} className="nt-tool">{t}</button>)}
                </div>
                <textarea className="nt-desc-area" placeholder=""/>
              </div>
            </div>
            <div className="nt-footer">
              <div className="nt-priority-dot">1</div>
              <button className="nt-btn-save">Save and Create Another</button>
              <button className="nt-btn-create" onClick={() => {
                if (!ticketTitle.trim()) { setTicketTitleError(true); return; }
                setTicketModalOpen(false);
                showToast('Ticket created: ' + ticketTitle);
                setTicketTitle('');
              }}>Create</button>
            </div>
          </div>
        </div>
      )}

      <TweaksPanel>
        <TweakColor label="Accent color" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)}/>
        <TweakToggle label="Avatar pulse on incoming" value={tweaks.showAvatarPulse} onChange={v => setTweak('showAvatarPulse', v)}/>
        <TweakToggle label="Auto-trigger incoming call" value={tweaks.autoIncoming} onChange={v => setTweak('autoIncoming', v)}/>
        <TweakButton label="Simulate incoming call" onClick={triggerIncoming}/>
        {isCalling && (
          <TweakButton label={minimized ? 'Expand to widget' : 'Minimize to pill'} onClick={() => {
            if (minimized) { setMinimized(false); setOpen(true); }
            else { setMinimized(true); setOpen(false); }
          }}/>
        )}
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<SoftphoneApp />);
</script>
</body>
</html>
